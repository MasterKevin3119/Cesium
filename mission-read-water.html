<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Read The Water — Flood Simulator</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="mission-pages.css" />
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseConfig.js?v=202604023"></script>
  <script src="js/supabaseAuth.js?v=202604025"></script>
  <script src="js/requireAuthGate.js?v=202604081"></script>
  <div class="mission-shell">
    <header class="mission-shell__header">
      <a class="logo" href="index.html">Flood Simulator</a>
      <div class="mission-shell__player" id="missionPlayerSlot" aria-label="Your explorer"></div>
      <nav class="mission-shell__nav" aria-label="Mission navigation">
        <a href="index.html#mission">All missions</a>
        <a href="viewer.html">Simulation</a>
      </nav>
    </header>
    <main class="mission-shell__main">
      <span class="mission-shell__badge">Mini-game</span>
      <h1 class="mission-shell__title">Read The Water</h1>
      <p class="mission-shell__lead">Practice recognising flood depth from scenes before you start.</p>
      <div class="mission-shell__card">
        <p>
          Learn what <strong style="color: var(--text);">0.5 m</strong> and <strong style="color: var(--text);">1.0 m</strong> flood depths look like through quick visual challenges. Options are shuffled each time you play.
        </p>
      </div>
      <div class="mission-actions">
        <a class="btn btn-primary" href="viewer.html?mission=read-water">Play</a>
        <a class="btn btn-secondary" href="index.html#mission">Back to missions</a>
      </div>
    </main>
  </div>
  <script src="js/userAvatar.js?v=202604023"></script>
  <script>
    (function () {
      function go() {
        var slot = document.getElementById("missionPlayerSlot");
        if (slot && window.userAvatar && typeof window.userAvatar.mountInSlot === "function") {
          window.userAvatar.mountInSlot(slot, { size: 44 });
        }
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", go);
      else go();
    })();
  </script>
</body>
</html>
