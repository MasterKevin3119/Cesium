<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission complete — Flood Simulator</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="mission-pages.css" />
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseConfig.js?v=202604023"></script>
  <script src="js/supabaseAuth.js?v=202604025"></script>
  <script src="js/requireAuthGate.js?v=202604081"></script>
  <div class="mission-shell">
    <header class="mission-shell__header">
      <a class="logo" href="index.html">Flood Simulator</a>
      <div class="mission-shell__player" id="missionPlayerSlot" aria-label="Your explorer"></div>
      <nav class="mission-shell__nav" aria-label="Mission navigation">
        <a href="index.html#mission">All missions</a>
        <a href="viewer.html">Simulation</a>
      </nav>
    </header>
    <main class="mission-shell__main">
      <span class="mission-shell__badge">Complete</span>
      <h1 class="mission-shell__title mission-end__title" id="endTitle">Mission complete</h1>
      <p class="mission-end__sub" id="endSub"></p>
      <div class="mission-shell__card mission-end-summary" id="missionFirstTrySummary" hidden aria-live="polite"></div>
      <div class="mission-actions">
        <a class="btn btn-primary" id="btnNextMission" href="index.html#mission">Next</a>
        <a class="btn btn-secondary" id="btnMissionHub" href="index.html#mission">Back to missions</a>
      </div>
    </main>
  </div>
  <script>
    (function () {
      var ORDER = [
        { id: "read-water", label: "Read The Water", intro: "mission-read-water.html", play: "viewer.html?mission=read-water" },
        { id: "flooded-areas", label: "Identify Flooded Areas", intro: "mission-flooded-areas.html", play: "viewer.html?mission=flooded-areas" },
        { id: "decision-making", label: "Flood Awareness & Decision Making", intro: "mission-decision-making.html", play: "viewer.html?mission=decision-making" }
      ];
      var params = new URLSearchParams(window.location.search);
      var completed = params.get("completed") || "";
      var idx = ORDER.findIndex(function (m) { return m.id === completed; });

      var titleEl = document.getElementById("endTitle");
      var subEl = document.getElementById("endSub");
      var btnNext = document.getElementById("btnNextMission");
      var btnHub = document.getElementById("btnMissionHub");

      if (titleEl) titleEl.textContent = "Mission complete";

      if (idx < 0) {
        if (subEl) subEl.textContent = "Thanks for playing. Return to the mission list when you are ready.";
        if (btnNext) btnNext.hidden = true;
      } else {
        var mission = ORDER[idx];
        if (subEl) {
          subEl.textContent =
            "You finished " + mission.label + ". Go to the next mission or return to the mission list.";
        }
        var next = ORDER[idx + 1];
        if (btnNext) {
          if (next) {
            btnNext.textContent = "Next mission";
            btnNext.href = next.intro;
          } else {
            btnNext.textContent = "Play again";
            btnNext.href = mission.intro;
          }
        }
      }

      if (btnHub) {
        btnHub.textContent = "Back to missions";
        btnHub.href = "index.html#mission";
      }

      var missionLabel = idx >= 0 && ORDER[idx] ? ORDER[idx].label : "";
      window.__MISSION_END_COMPLETED__ = completed;
      window.__MISSION_END_LABEL__ = missionLabel;
    })();
  </script>
  <script src="js/missionEndSummary.js?v=202604081"></script>
  <script>
    (function () {
      var id = window.__MISSION_END_COMPLETED__ || "";
      var label = window.__MISSION_END_LABEL__ || "";
      if (window.missionEndSummary && typeof window.missionEndSummary.run === "function") {
        window.missionEndSummary.run(id, label);
      }
    })();
  </script>
  <script src="js/userAvatar.js?v=202604023"></script>
  <script>
    (function () {
      function go() {
        var slot = document.getElementById("missionPlayerSlot");
        if (slot && window.userAvatar && typeof window.userAvatar.mountInSlot === "function") {
          window.userAvatar.mountInSlot(slot, { size: 44 });
        }
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", go);
      else go();
    })();
  </script>
</body>
</html>
